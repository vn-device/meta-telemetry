<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi 5 RP1 Console</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: #1e1e1e;
            --bg-surface-elevated: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #bb86fc;
            --success: #03dac6;
            --danger: #cf6679;
            --border: #333333;
            --pin-3v3: #ffb74d;
            --pin-5v: #e57373;
            --pin-gnd: #757575;
            --pin-gpio: #81c784;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(207, 102, 121, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background-color: rgba(3, 218, 198, 0.1);
            color: var(--success);
            border-color: var(--success);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn:hover {
            background-color: var(--bg-surface);
        }

        .tab-btn.active {
            background-color: rgba(187, 134, 252, 0.1);
            color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Telemetry Grid */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .card-value {
            font-size: 28px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .controls-section {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .controls-header {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Pinout Diagram */
        .pinout-container {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .pinout-wrapper {
            overflow-x: auto;
            /* Native momentum scrolling on touch devices */
            -webkit-overflow-scrolling: touch;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(20, minmax(28px, 1fr));
            grid-template-rows: repeat(2, auto);
            gap: 4px;
            justify-content: center;
            margin: 0 auto;
            /* Buffer zone to absorb hover transforms and box-shadows on edge pins */
            padding: 12px;
        }

        .pin {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            background-color: var(--bg-base);
            border: 2px solid var(--border);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            user-select: none;
        }

        /* Non-Configurable Pins */
        .pin.power3v3, .pin.power5v, .pin.gnd {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .pin.power3v3 { border-color: var(--pin-3v3); color: var(--pin-3v3); }
        .pin.power5v { border-color: var(--pin-5v); color: var(--pin-5v); }
        .pin.gnd { border-color: var(--pin-gnd); color: var(--pin-gnd); }
        
        /* Configurable GPIO */
        .pin.gpio {
            border-color: var(--pin-gpio);
            color: var(--pin-gpio);
            cursor: pointer;
        }
        .pin.gpio:hover {
            transform: scale(1.15);
            box-shadow: 0 0 8px rgba(129, 199, 132, 0.4);
        }

        /* System Reserved (ID_EEPROM) */
        .pin.reserved {
            border-color: var(--accent);
            color: var(--accent);
            cursor: not-allowed;
            background: repeating-linear-gradient(
                45deg,
                rgba(187, 134, 252, 0.1),
                rgba(187, 134, 252, 0.1) 4px,
                transparent 4px,
                transparent 8px
            );
        }

        .pin.highlight {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px rgba(187, 134, 252, 0.4);
        }

        /* Minimalist Color Legend */
        .legend-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-ring {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 2px solid;
            background-color: transparent;
            box-sizing: border-box;
        }

        .legend-label {
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Map CSS variables to legend items */
        .legend-5v .legend-ring, .legend-5v .legend-label { border-color: var(--pin-5v); color: var(--pin-5v); }
        .legend-3v3 .legend-ring, .legend-3v3 .legend-label { border-color: var(--pin-3v3); color: var(--pin-3v3); }
        .legend-gnd .legend-ring, .legend-gnd .legend-label { border-color: var(--pin-gnd); color: var(--pin-gnd); }
        .legend-gpio .legend-ring, .legend-gpio .legend-label { border-color: var(--pin-gpio); color: var(--pin-gpio); }
        
        .legend-reserved .legend-ring { 
            border-color: var(--accent); 
            background: repeating-linear-gradient(
                45deg,
                rgba(187, 134, 252, 0.4),
                rgba(187, 134, 252, 0.4) 2px,
                transparent 2px,
                transparent 4px
            ); 
        }
        .legend-reserved .legend-label { color: var(--accent); }

        /* Modal Context Card */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .modal-header h3 { 
            margin: 0; 
            font-size: 18px; 
            font-family: monospace; 
            color: var(--accent); 
        }

        .modal-close { 
            background: none; 
            border: none; 
            color: var(--text-secondary); 
            font-size: 24px; 
            cursor: pointer; 
            line-height: 1;
        }
        .modal-close:hover { color: var(--danger); }
        
        .modal-desc { 
            font-size: 14px; 
            color: var(--text-secondary); 
            line-height: 1.5; 
            margin-bottom: 24px; 
        }

        .read-only-badge {
            background-color: rgba(117, 117, 117, 0.1);
            color: var(--pin-gnd);
            border: 1px dashed var(--pin-gnd);
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        /* Modal Interactive Controls */
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background-color: var(--bg-base);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .control-group label { font-size: 14px; font-weight: 500; }

        .segmented-control {
            display: flex;
            background-color: var(--bg-surface-elevated);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .segmented-control button {
            background: none; border: none; color: var(--text-secondary);
            padding: 6px 16px; font-size: 12px; font-weight: bold; cursor: pointer;
            transition: background 0.1s;
        }
        .segmented-control button.active { 
            background-color: var(--accent); 
            color: #000; 
        }

        /* Hardware Slide Toggle */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: var(--bg-surface-elevated); transition: .2s; border-radius: 24px; 
            border: 1px solid var(--border);
        }
        .slider:before { 
            position: absolute; content: ""; height: 16px; width: 16px; 
            left: 3px; bottom: 3px; background-color: var(--text-secondary); 
            transition: .2s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: rgba(129, 199, 132, 0.2); border-color: var(--pin-gpio); }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--pin-gpio); }
        
        .state-label { 
            font-family: monospace; font-size: 13px; font-weight: bold; 
            min-width: 90px; text-align: right; color: var(--text-primary);
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Pi 5 RP1 Console</h1>
            <div id="conn-status" class="status-badge">Disconnected</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('telemetry')">Telemetry Overview</button>
            <button class="tab-btn" onclick="switchTab('gpio')">I/O Pinout</button>
        </div>

        <!-- Interactive Pin Overlay Modal -->
        <div id="pin-modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
            <div class="modal-card">
                <div class="modal-header">
                    <h3 id="modal-title">Pin X: --</h3>
                    <button class="modal-close" onclick="closePinModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p id="modal-desc" class="modal-desc">--</p>
                    <div id="modal-controls">
                        <!-- Dynamic DOM injection by JavaScript -->
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-telemetry" class="tab-content active">
            <div class="grid-cards">
                <div class="card">
                    <span class="card-label">Navigation Mode</span>
                    <span id="nav-mode" class="card-value" style="color: var(--accent);">STANDBY</span>
                </div>
                <div class="card">
                    <span class="card-label">OS Uptime</span>
                    <span id="os-runtime" class="card-value">0s</span>
                </div>
                <div class="card">
                    <span class="card-label">Daemon Runtime</span>
                    <span id="app-runtime" class="card-value">0s</span>
                </div>
            </div>
        </div>

        <div id="tab-gpio" class="tab-content">
            <div class="pinout-container">
                <div class="controls-header" style="text-align: center;">Raspberry Pi 5 J8 Header</div>
                <div class="pinout-wrapper">
                    <div id="pin-grid" class="pin-grid">
                        <!-- JavaScript populates grid here -->
                    </div>
                </div>
                
                <!-- Minimalist Color Legend -->
                <div class="legend-container">
                    <div class="legend-item legend-5v">
                        <div class="legend-ring"></div>
                        <span class="legend-label">5V Power</span>
                    </div>
                    <div class="legend-item legend-3v3">
                        <div class="legend-ring"></div>
                        <span class="legend-label">3.3V Power</span>
                    </div>
                    <div class="legend-item legend-gnd">
                        <div class="legend-ring"></div>
                        <span class="legend-label">Ground</span>
                    </div>
                    <div class="legend-item legend-gpio">
                        <div class="legend-ring"></div>
                        <span class="legend-label">Configurable I/O</span>
                    </div>
                    <div class="legend-item legend-reserved">
                        <div class="legend-ring"></div>
                        <span class="legend-label">System Reserved</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            Designed by Vinh Nguyen (vn-device)
        </div>
    </div>

    <script>
        let ws;

        // RPi 5 40-Pin Header Definition
        const piPinout = [
            { pin: 1, name: '3V3 Power', type: 'power3v3' },  { pin: 2, name: '5V Power', type: 'power5v' },
            { pin: 3, name: 'GPIO 2 (SDA)', type: 'gpio' },   { pin: 4, name: '5V Power', type: 'power5v' },
            { pin: 5, name: 'GPIO 3 (SCL)', type: 'gpio' },   { pin: 6, name: 'Ground', type: 'gnd' },
            { pin: 7, name: 'GPIO 4 (GPCLK0)', type: 'gpio' },{ pin: 8, name: 'GPIO 14 (TXD)', type: 'gpio', highlight: true },
            { pin: 9, name: 'Ground', type: 'gnd' },          { pin: 10, name: 'GPIO 15 (RXD)', type: 'gpio' },
            { pin: 11, name: 'GPIO 17', type: 'gpio' },       { pin: 12, name: 'GPIO 18 (PCM_CLK)', type: 'gpio' },
            { pin: 13, name: 'GPIO 27', type: 'gpio' },       { pin: 14, name: 'Ground', type: 'gnd' },
            { pin: 15, name: 'GPIO 22', type: 'gpio' },       { pin: 16, name: 'GPIO 23', type: 'gpio' },
            { pin: 17, name: '3V3 Power', type: 'power3v3' }, { pin: 18, name: 'GPIO 24', type: 'gpio' },
            { pin: 19, name: 'GPIO 10 (SPI0 MOSI)', type: 'gpio' },{ pin: 20, name: 'Ground', type: 'gnd' },
            { pin: 21, name: 'GPIO 9 (SPI0 MISO)', type: 'gpio' }, { pin: 22, name: 'GPIO 25', type: 'gpio' },
            { pin: 23, name: 'GPIO 11 (SPI0 SCLK)', type: 'gpio' },{ pin: 24, name: 'GPIO 8 (SPI0 CE0)', type: 'gpio' },
            { pin: 25, name: 'Ground', type: 'gnd' },         { pin: 26, name: 'GPIO 7 (SPI0 CE1)', type: 'gpio' },
            { pin: 27, name: 'GPIO 0 (ID_SD)', type: 'reserved' },{ pin: 28, name: 'GPIO 1 (ID_SC)', type: 'reserved' },
            { pin: 29, name: 'GPIO 5', type: 'gpio' },        { pin: 30, name: 'Ground', type: 'gnd' },
            { pin: 31, name: 'GPIO 6', type: 'gpio' },        { pin: 32, name: 'GPIO 12 (PWM0)', type: 'gpio' },
            { pin: 33, name: 'GPIO 13 (PWM1)', type: 'gpio' },{ pin: 34, name: 'Ground', type: 'gnd' },
            { pin: 35, name: 'GPIO 19 (SPI1 MISO)', type: 'gpio' },{ pin: 36, name: 'GPIO 16', type: 'gpio' },
            { pin: 37, name: 'GPIO 26', type: 'gpio' },       { pin: 38, name: 'GPIO 20 (SPI1 MOSI)', type: 'gpio' },
            { pin: 39, name: 'Ground', type: 'gnd' },         { pin: 40, name: 'GPIO 21 (SPI1 SCLK)', type: 'gpio' }
        ];

        // Isolated Frontend State Dictionary
        const frontendGpioState = {};

        function renderPinout() {
            const grid = document.getElementById('pin-grid');
            grid.innerHTML = ''; // Clear previous renders
            
            // Map rows based on physical pin configuration constraints
            // Row 1: Top header line (Even Pins)
            const evenPins = piPinout.filter(p => p.pin % 2 === 0);
            // Row 2: Bottom header line (Odd Pins)
            const oddPins = piPinout.filter(p => p.pin % 2 !== 0);

            const renderRow = (pins) => {
                pins.forEach(pinData => {
                    const pinDiv = document.createElement('div');
                    
                    let classes = `pin ${pinData.type}`;
                    if (pinData.highlight) classes += ' highlight';
                    pinDiv.className = classes;
                    
                    // Render minimalist circular representation
                    pinDiv.textContent = pinData.pin;
                    
                    // Bind click event to trigger Contextual Modal
                    pinDiv.onclick = () => openPinModal(pinData.pin);
                    
                    grid.appendChild(pinDiv);
                });
            };

            // Maintain sequential topological ordering
            renderRow(evenPins);
            renderRow(oddPins);
        }

        function openPinModal(pinId) {
            const pinData = piPinout.find(p => p.pin === pinId);
            if (!pinData) return;

            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const controls = document.getElementById('modal-controls');

            title.textContent = `Pin ${pinData.pin}: ${pinData.name}`;

            if (pinData.type === 'power5v' || pinData.type === 'power3v3' || pinData.type === 'gnd' || pinData.type === 'reserved') {
                // Case A: System Hard-Wired Lines
                if (pinData.type === 'power5v') desc.textContent = "5V power rail. Connected directly to main system power input.";
                if (pinData.type === 'power3v3') desc.textContent = "3.3V power rail sourced from the onboard PMIC. Maximum combined current draw must not exceed 50mA.";
                if (pinData.type === 'gnd') desc.textContent = "0V reference plane for digital signals and return currents.";
                if (pinData.type === 'reserved') desc.textContent = "Reserved I2C EEPROM interface for HAT auto-probing. Manipulation may corrupt boot sequence.";
                
                controls.innerHTML = `<div class="read-only-badge">SYSTEM HARD-WIRED (READ-ONLY)</div>`;
            } else {
                // Case B: Configurable GPIO Lines
                desc.textContent = "Configurable GPIO pin interfaced via the RP1 southbridge. Max source/sink current is 15mA per pin.";
                
                // Initialize default frontend mock state
                if (!frontendGpioState[pinId]) {
                    frontendGpioState[pinId] = { mode: 'IN', val: 0 };
                }
                const state = frontendGpioState[pinId];

                controls.innerHTML = `
                    <div class="control-group">
                        <label>Direction</label>
                        <div class="segmented-control">
                            <button class="${state.mode === 'IN' ? 'active' : ''}" onclick="updatePinMode(${pinId}, 'IN')">INPUT</button>
                            <button class="${state.mode === 'OUT' ? 'active' : ''}" onclick="updatePinMode(${pinId}, 'OUT')">OUTPUT</button>
                        </div>
                    </div>
                    <div class="control-group" id="state-toggle-group" style="display: ${state.mode === 'OUT' ? 'flex' : 'none'};">
                        <label>Voltage State</label>
                        <label class="switch">
                            <input type="checkbox" ${state.val === 1 ? 'checked' : ''} onchange="updatePinState(${pinId}, this.checked)">
                            <span class="slider"></span>
                        </label>
                        <span id="pin-state-label-${pinId}" class="state-label">${state.val === 1 ? 'HIGH (3.3V)' : 'LOW (0V)'}</span>
                    </div>
                `;
            }

            document.getElementById('pin-modal-overlay').style.display = 'flex';
        }

        function closePinModal() {
            document.getElementById('pin-modal-overlay').style.display = 'none';
        }

        function handleOverlayClick(event) {
            if (event.target.id === 'pin-modal-overlay') {
                closePinModal();
            }
        }

        function updatePinMode(pinId, mode) {
            frontendGpioState[pinId].mode = mode;
            openPinModal(pinId); // Force re-render of modal DOM
        }

        function updatePinState(pinId, isHigh) {
            frontendGpioState[pinId].val = isHigh ? 1 : 0;
            document.getElementById(`pin-state-label-${pinId}`).textContent = isHigh ? 'HIGH (3.3V)' : 'LOW (0V)';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.hostname}:8080`);

            ws.onopen = () => {
                const status = document.getElementById('conn-status');
                status.textContent = 'Connected';
                status.classList.add('connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById('os-runtime').textContent = data.os_runtime + 's';
                document.getElementById('app-runtime').textContent = data.app_runtime + 's';
            };

            ws.onclose = () => {
                const status = document.getElementById('conn-status');
                status.textContent = 'Disconnected';
                status.classList.remove('connected');
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
            };
        }

        window.onload = () => {
            renderPinout();
            connectWebSocket();
        };
    </script>
</body>
</html>
