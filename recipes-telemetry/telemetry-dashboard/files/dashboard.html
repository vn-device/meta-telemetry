<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi 5 Telemetry Dashboard</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: #1e1e1e;
            --bg-surface-elevated: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #bb86fc;
            --success: #03dac6;
            --danger: #cf6679;
            --border: #333333;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(207, 102, 121, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background-color: rgba(3, 218, 198, 0.1);
            color: var(--success);
            border-color: var(--success);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .card-value {
            font-size: 28px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .controls-section {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-top: 10px;
        }

        .controls-header {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Hardware Telemetry</h1>
            <div id="conn-status" class="status-badge">Disconnected</div>
        </div>

        <div class="grid-cards">
            <div class="card">
                <span class="card-label">Navigation Mode</span>
                <span id="nav-mode" class="card-value" style="color: var(--accent);">STANDBY</span>
            </div>
            <div class="card">
                <span class="card-label">OS Uptime</span>
                <span id="os-runtime" class="card-value">0s</span>
            </div>
            <div class="card">
                <span class="card-label">Daemon Runtime</span>
                <span id="app-runtime" class="card-value">0s</span>
            </div>
            <div class="card">
                <span class="card-label">GPIO 14</span>
                <span id="gpio-state" class="card-value">--</span>
            </div>
        </div>

        <div class="controls-section">
            <div class="controls-header">Actuators</div>
            <button class="btn" onclick="toggleGPIO()">Toggle GPIO 14 State</button>
        </div>

        <div class="footer">
            Designed by Vinh Nguyen (vn-device)
        </div>
    </div>

    <script>
        let ws;

        function connectWebSocket() {
            // Dynamically resolve the Pi's IP address based on the current browser URL
            ws = new WebSocket(`ws://${window.location.hostname}:8080`);

            ws.onopen = () => {
                const status = document.getElementById('conn-status');
                status.textContent = 'Connected';
                status.classList.add('connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById('os-runtime').textContent = data.os_runtime + 's';
                document.getElementById('app-runtime').textContent = data.app_runtime + 's';
                document.getElementById('gpio-state').textContent = data.gpio_14;
            };

            ws.onclose = () => {
                const status = document.getElementById('conn-status');
                status.textContent = 'Disconnected';
                status.classList.remove('connected');
                
                // 2000ms Reconnect loop
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
            };
        }

        function toggleGPIO() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('TOGGLE_GPIO_14');
            } else {
                console.warn('Cannot send command: WebSocket disconnected.');
            }
        }

        window.onload = connectWebSocket;
    </script>
</body>
</html>
