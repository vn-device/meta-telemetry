# Listen for UDP connections on all IPv4 interfaces
agentAddress udp:161

# Enable AgentX socket for the custom C telemetry subagent
master agentx

# Whitelist the custom telemetry tree to the allowed view
view systemonly included .1.3.6.1.4.1.99999

# V2c Debug Fallback (Required for your active test matrix)
rocommunity public default -V systemonly

# V3 Production Security Matrix
createUser admin SHA "authpassword123" AES "privpassword123"
rouser admin authPriv -V systemonly