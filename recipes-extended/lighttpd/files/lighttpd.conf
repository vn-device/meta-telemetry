# Base module configuration
server.modules = (
    "mod_access",
    "mod_cgi",
    "mod_accesslog"
)

server.document-root        = "/www/pages"
server.upload-dirs          = ( "/var/cache/lighttpd/uploads" )
server.errorlog             = "/var/log/lighttpd/error.log"
server.pid-file             = "/run/lighttpd.pid"
server.username             = "www-data"
server.groupname            = "www-data"
server.port                 = 80

# Map standard CGI and shell script extensions to the local CGI handler
cgi.assign = ( 
    ".cgi" => "",
    ".sh"  => "/bin/bash"
)

# Force index.cgi as the default landing page
index-file.names = ( "index.cgi", "index.html" )

mimetype.assign = (
  ".html" => "text/html", 
  ".txt"  => "text/plain",
  ".jpg"  => "image/jpeg",
  ".png"  => "image/png", 
  ".css"  => "text/css"
)
